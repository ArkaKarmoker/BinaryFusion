{% extends 'app_base.html' %}

{% block content %}
    <main class="container mx-auto px-4 py-8 flex-grow">
        <section class="mb-8">
            <div class="card p-6 max-w-md mx-auto w-full glow-card">
                <h2 class="text-base section-title mb-4 w-full text-center flex justify-center"><i class="fa-solid fa-crosshairs text-sm"></i> Enter Trading Asset</h2>
                <form id="predict-form" class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-3" onsubmit="submitPrediction(event)">
                    <input type="search" id="symbol" name="symbol" list="popular-assets" placeholder="e.g., EURUSD=X or BTC-USD" required
                           class="input-field w-full p-2 text-center">
                    
                    <datalist id="popular-assets">
                        <option value="EURUSD=X">EUR/USD (Euro / US Dollar)</option>
                        <option value="GBPUSD=X">GBP/USD (British Pound / US Dollar)</option>
                        <option value="USDJPY=X">USD/JPY (US Dollar / Japanese Yen)</option>
                        <option value="AUDUSD=X">AUD/USD (Australian Dollar / US Dollar)</option>
                        <option value="USDCAD=X">USD/CAD (US Dollar / Canadian Dollar)</option>
                        <option value="USDCHF=X">USD/CHF (US Dollar / Swiss Franc)</option>
                        <option value="NZDUSD=X">NZD/USD (New Zealand Dollar / US Dollar)</option>
                        <option value="EURJPY=X">EUR/JPY (Euro / Japanese Yen)</option>
                        <option value="GBPJPY=X">GBP/JPY (British Pound / Japanese Yen)</option>
                        <option value="BTC-USD">BTC/USD (Bitcoin)</option>
                        <option value="ETH-USD">ETH/USD (Ethereum)</option>
                        <option value="SOL-USD">SOL/USD (Solana)</option>
                        <option value="BNB-USD">BNB/USD (Binance Coin)</option>
                        <option value="XRP-USD">XRP/USD (Ripple)</option>
                        <option value="ADA-USD">ADA/USD (Cardano)</option>
                        <option value="^GSPC">S&P 500 (US Stock Index)</option>
                        <option value="^DJI">Dow Jones Industrial Average</option>
                        <option value="^IXIC">NASDAQ Composite</option>
                        <option value="^FTSE">FTSE 100 (UK Index)</option>
                        <option value="GC=F">Gold Futures</option>
                        <option value="CL=F">Crude Oil Futures</option>
                    </datalist>

                    <button type="submit" class="btn-primary w-full sm:w-auto h-10 px-6 whitespace-nowrap">
                        <i class="fa fa-rocket"></i> Predict
                        <span id="loading-spinner" class="spinner"></span>
                        <span id="countdown-timer" class="countdown text-primary-foreground"></span>
                    </button>
                    {% csrf_token %}
                </form>
                <p class="text-xs text-center mt-4 font-medium" style="color: var(--muted-foreground);">Timeframe: <span class="badge badge-secondary" style="font-size: 0.7rem; padding: 0.1rem 0.5rem;">M5</span></p>
                <p class="text-xs text-center mt-2 font-medium" style="color: var(--muted-foreground);">Available Tokens: <span id="token-count" style="color: var(--foreground);">{{ initial_tokens }}</span> / <span id="max-tokens">{{ max_tokens }}</span></p>
            </div>
        </section>

        <div id="results-wrapper" class="hidden">
            <section id="results-section" class="results-container">
            </section>

            <div id="feedback-container" class="flex justify-center items-center gap-4 mt-4 mb-2 w-full">
                <button class="feedback-btn like" onclick="sendFeedback('LIKE')">
                    <i class="fa fa-thumbs-up"></i> <span>Like</span>
                </button>
                <button class="feedback-btn dislike" onclick="sendFeedback('DISLIKE')">
                    <i class="fa fa-thumbs-down"></i> <span>Dislike</span>
                </button>
            </div>

            <div id="button-container" class="button-container">
                <button id="btn-telegram" onclick="sendToTelegram()" class="btn-outline w-full sm:w-auto" style="color: #3b82f6; border-color: #bfdbfe;">
                    <i class="fab fa-telegram"></i> Telegram
                </button>

                <button id="btn-copy" onclick="copySignal()" class="btn-outline w-full sm:w-auto" style="color: #6366f1; border-color: #c7d2fe;">
                    <i class="fa fa-copy"></i> Copy
                </button>

                <button id="btn-share" onclick="shareSignal()" class="btn-outline w-full sm:w-auto" style="color: #10b981; border-color: #a7f3d0;">
                    <i class="fa fa-share-alt"></i> Share
                </button>

                <button onclick="closeResults()" class="btn-outline w-full sm:w-auto" style="color: var(--destructive); border-color: rgba(239, 68, 68, 0.2);">
                    <i class="fa fa-close"></i> Close
                </button>
            </div>
        </div>

        <div class="card calendar-card p-6 mt-6 w-full overflow-hidden">
            <h3 class="text-base section-title mb-6"><i class="fa fa-calendar-alt text-sm"></i> Upcoming Economic Events</h3>
            <div class="overflow-x-auto">
                <table id="calendarTable" class="w-full">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Cur</th>
                            <th>Event</th>
                            <th>Impact</th>
                            <th>Prev</th>
                            <th>Actual</th>
                            <th>Fcst</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
{% endblock %}

{% block app_config %}
    <script>
        window.APP_CONFIG = {
            calendarDataUrl: '{% url "calendar_data" %}'
        };
    </script>
{% endblock %}
