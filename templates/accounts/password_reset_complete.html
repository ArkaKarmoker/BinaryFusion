{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - BinaryFusion</title>

    <link rel="icon" type="image/jpg" href="https://cdn.vectorstock.com/i/500p/24/31/candlestick-chart-icon-stock-fluctuations-vector-45672431.jpg">

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        /* --- FIX FOR MOBILE TAP HIGHLIGHT (SQUARE SHADOW) --- */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        button:focus {
            outline: none !important;
        }
        /* ---------------------------------------------------- */

        /* Custom styles matching app.html */
        .light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .dark-mode {
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
        }
        
        .login-card {
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            max-width: 400px;
        }
        
        .light-mode .login-card {
            background: white;
            color: #2d3748;
        }
        
        .dark-mode .login-card {
            background: #2d3748;
            color: #f7fafc;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .section-title {
            font-weight: 600;
            border-bottom: 2px solid #4a90e2;
            display: inline-block;
            padding-bottom: 4px;
        }
        
        .light-mode .section-title {
            color: #2d3748;
        }
        
        .dark-mode .section-title {
            color: #e2e8f0;
        }
        
        .login-button {
            transition: all 0.3s ease;
        }
        
        /* Trading Background Animation */
        .trading-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col light-mode transition-colors duration-300" id="body">
    <canvas id="tradingCanvas" class="trading-animation"></canvas>

    <button class="theme-toggle bg-gray-200 dark:bg-gray-700 p-2 rounded-full" onclick="toggleTheme()">
        <span class="light-icon">🌙</span>
        <span class="dark-icon hidden">☀️</span>
    </button>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-6 relative w-full px-4 sm:px-6 lg:px-8 mx-auto">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold">📊 BinaryFusion</h1>
                <p class="text-lg mt-1"><i>Reset Complete</i></p>
            </div>
            <div class="flex flex-col sm:flex-row items-center space-y-3 sm:space-y-0 sm:space-x-4 w-full md:w-auto justify-center md:justify-end">
                <a href="/" class="inline-block bg-white text-indigo-600 px-4 py-2 rounded hover:bg-gray-100 transition text-base font-semibold shadow-md whitespace-nowrap">
                    <i class="fa fa-arrow-left mr-1"></i> Go to home page
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow flex items-center justify-center">
        <div class="login-card p-8 w-full max-w-md text-center">
            
            <div class="mb-6">
                <i class="fa fa-check-circle text-5xl text-blue-500"></i>
            </div>
            
            <h2 class="text-2xl font-bold mb-4">Password Reset Complete</h2>
            
            <p class="mb-8 opacity-80">
                Your password has been set successfully. You may go ahead and log in now.
            </p>
            
            <a href="{% url 'login' %}" 
               class="login-button inline-block w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition duration-200">
               <i class="fa fa-sign-in mr-2"></i> Log In
            </a>

        </div>
    </main>

    <footer class="bg-gray-800 text-white py-4 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p>© 2025 BinaryFusion. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Theme Toggle Functionality
        function toggleTheme() {
            const body = document.getElementById('body');
            const lightIcon = document.querySelector('.light-icon');
            const darkIcon = document.querySelector('.dark-icon');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
                localStorage.setItem('theme', 'light');
            }
        }

        // Load saved theme preference
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const body = document.getElementById('body');
            const lightIcon = document.querySelector('.light-icon');
            const darkIcon = document.querySelector('.dark-icon');

            if (savedTheme === 'dark') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }

            // Initialize trading animation
            initTradingAnimation();
        });

        // Trading Background Animation
        function initTradingAnimation() {
            const canvas = document.getElementById('tradingCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');

            const candles = [];
            const candleCount = Math.floor(window.innerWidth / 20);
            const maxHeight = window.innerHeight * 0.3;
            const minHeight = 20;

            // Initialize candles
            for (let i = 0; i < candleCount; i++) {
                candles.push({
                    x: i * 20,
                    height: minHeight + Math.random() * (maxHeight - minHeight),
                    direction: Math.random() > 0.5 ? 1 : -1,
                    speed: 0.5 + Math.random() * 0.5,
                    wickHeight: 10 + Math.random() * 20
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                candles.forEach(candle => {
                    // Update candle height
                    candle.height += candle.direction * candle.speed;
                    if (candle.height > maxHeight || candle.height < minHeight) {
                        candle.direction *= -1;
                    }

                    // Draw candle body
                    ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#63b3ed' : '#4a90e2';
                    ctx.fillRect(candle.x, canvas.height - candle.height, 8, candle.height);

                    // Draw wick
                    ctx.fillStyle = document.body.classList.contains('dark-mode') ? '#e2e8f0' : '#2d3748';
                    ctx.fillRect(candle.x + 3, canvas.height - candle.height - candle.wickHeight, 2, candle.wickHeight);
                    ctx.fillRect(candle.x + 3, canvas.height, 2, candle.wickHeight);
                });

                requestAnimationFrame(animate);
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            animate();
        }
    </script>
</body>
</html>
