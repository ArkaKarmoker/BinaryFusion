<div id="change-password-tab" class="tab-content">
            <div class="card p-6">
                <h2 class="text-xl section-title mb-4"><i class="fa fa-key"></i> Change Password</h2>
                <form id="password-form" method="post" action="{% url 'dashboard' %}" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label for="current_password" class="block text-sm font-medium mb-1">Current Password</label>
                        <div class="relative">
                            <input type="password" name="current_password" id="current_password" class="input-field w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10" placeholder="Enter current password" required>
                            <i class="fas fa-eye absolute right-3 top-3 cursor-pointer text-gray-500" onclick="togglePasswordVisibility('current_password', this)"></i>
                        </div>
                    </div>
                    <div>
                        <label for="new_password" class="block text-sm font-medium mb-1">New Password</label>
                        <div class="relative">
                            <input type="password" name="new_password" id="new_password" class="input-field w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10" placeholder="Enter new password" required>
                            <i class="fas fa-eye absolute right-3 top-3 cursor-pointer text-gray-500" onclick="togglePasswordVisibility('new_password', this)"></i>
                        </div>
                    </div>
                    <div>
                        <label for="confirm_new_password" class="block text-sm font-medium mb-1">Confirm New Password</label>
                        <div class="relative">
                            <input type="password" name="confirm_new_password" id="confirm_new_password" class="input-field w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10" placeholder="Confirm new password" required>
                            <i class="fas fa-eye absolute right-3 top-3 cursor-pointer text-gray-500" onclick="togglePasswordVisibility('confirm_new_password', this)"></i>
                        </div>
                    </div>
                    <button type="submit" name="change_password" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition duration-200 w-full">Save</button>
                </form>
            </div>
        </div>
